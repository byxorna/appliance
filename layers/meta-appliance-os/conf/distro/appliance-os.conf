# appliance-os distro configuration
#
# Thin wrapper around poky for single-purpose appliance images.
# Switches to systemd, drops desktop/mobile features not needed
# on a headless-ish embedded device with a fixed UI.

require conf/distro/poky.conf

DISTRO = "appliance-os"
DISTRO_NAME = "Appliance OS"
DISTRO_VERSION ?= "0.0.0-unknown"

# --- init system -----------------------------------------------------------
INIT_MANAGER = "systemd"
DISTRO_FEATURES:append = " systemd"
DISTRO_FEATURES:remove = "sysvinit"
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
VIRTUAL-RUNTIME_login_manager = "shadow-base"

# --- strip features we don't need ------------------------------------------
DISTRO_FEATURES:remove = " \
    3g \
    nfc \
    x11 \
    nfs \
    pulseaudio \
    ptest \
    debuginfod \
    zeroconf \
"

# --- keep these explicitly --------------------------------------------------

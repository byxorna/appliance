# appliance-os distro configuration
#
# Thin wrapper around poky for single-purpose appliance images.
# Switches to systemd, drops desktop/mobile features not needed
# on a headless-ish embedded device with a fixed UI.

require conf/distro/poky.conf

DISTRO = "appliance-os"
DISTRO_NAME = "Appliance OS"
APPLIANCE_VERSION ?= "0.0.0-unknown"
DISTRO_VERSION = "${APPLIANCE_VERSION}"

# --- os-release branding ---------------------------------------------------
# Populates /etc/os-release (and the login banner via base-files).
# VARIANT and VARIANT_ID are set from the APPLIANCE_VARIANT env var passed
# by kas from the Makefile (e.g. "reterminal-hifi").
APPLIANCE_VARIANT ?= "unknown"
ID_LIKE = "poky"
VARIANT = "${APPLIANCE_VARIANT}"
VARIANT_ID = "${APPLIANCE_VARIANT}"
APPLIANCE_HOME_URL ?= ""
APPLIANCE_BUG_REPORT_URL ?= ""
HOME_URL = "${APPLIANCE_HOME_URL}"
BUG_REPORT_URL = "${APPLIANCE_BUG_REPORT_URL}"
OS_RELEASE_FIELDS:append = " VARIANT VARIANT_ID HOME_URL BUG_REPORT_URL BUILD_ID"

# --- init system -----------------------------------------------------------
INIT_MANAGER = "systemd"
DISTRO_FEATURES:append = " systemd"
DISTRO_FEATURES:remove = "sysvinit"
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
VIRTUAL-RUNTIME_login_manager = "shadow-base"

# --- PAM (required by weston-init for autologin) --------------------------
DISTRO_FEATURES:append = " pam"

# --- static UID/GID assignment ---------------------------------------------
# Pin all service-account UIDs/GIDs so file ownership on the persistent /data
# partition stays correct after A/B rootfs updates.  Without stable IDs a UID
# allocated dynamically in slot A could map to a different user in slot B.
# Assignments live in layers/meta-appliance-os/files/{passwd,group}.
USERADDEXTENSION = "useradd-staticids"
USERADD_ERROR_DYNAMIC = "error"

# --- RAUC A/B updates ------------------------------------------------------
DISTRO_FEATURES:append = " rauc"

# --- strip features we don't need ------------------------------------------
DISTRO_FEATURES:remove = " \
    3g \
    nfc \
    x11 \
    nfs \
    pulseaudio \
    ptest \
    debuginfod \
    zeroconf \
"


# Appliance OS — logind policy for kiosk use.
#
# VT auto-getty: Disable automatic getty spawning on VTs.  Weston
# instances own VTs 2+ via weston@.service; an auto-spawned getty
# fights for the TTY and sends SIGHUP that kills the compositor.
# VT 1 keeps a getty via getty@tty1 (explicit enable, not autovt).
#
# Power button: tap to blank the screen (audio continues), hold 5+
# seconds to shut down cleanly.  All other sleep triggers disabled —
# this device must never suspend.
[Login]
NAutoVTs=0
ReserveVT=0
HandlePowerKey=lock
HandlePowerKeyLongPress=poweroff
HandleSuspendKey=ignore
HandleHibernateKey=ignore
HandleLidSwitch=ignore
HandleLidSwitchExternalPower=ignore
HandleLidSwitchDocked=ignore
IdleAction=ignore

# Appliance OS — power key and sleep policy for kiosk use.
#
# Tap the top-edge power button to blank the screen; audio playback
# continues.  Hold for 5+ seconds to shut down cleanly.  All other
# sleep triggers are disabled — this device must never suspend.
[Login]
HandlePowerKey=lock
HandlePowerKeyLongPress=poweroff
HandleSuspendKey=ignore
HandleHibernateKey=ignore
HandleLidSwitch=ignore
HandleLidSwitchExternalPower=ignore
HandleLidSwitchDocked=ignore
IdleAction=ignore

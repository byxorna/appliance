# Create /home/kiosk at boot (home partition is separate from rootfs)
d /home/kiosk 0750 kiosk kiosk -

# Create XDG_RUNTIME_DIR for the kiosk user.
# pam_systemd normally creates this on login, but the kiosk user
# doesn't go through a login session — its services are started
# directly by systemd.  The directory must exist before any app
# service tries to access Wayland sockets or write runtime state.
d /run/user/810 0700 kiosk kiosk -

# Podman container storage configuration for appliance-os.
# Store container images on the persistent /data partition so they
# survive A/B rootfs updates and are writable (rootfs is read-only).

[storage]
driver = "overlay"
graphroot = "/data/platform/containers/storage"
runroot = "/run/containers/storage"
tmpdir = "/data/platform/containers/tmp"

[storage.options.overlay]
mount_program = "/usr/bin/fuse-overlayfs"

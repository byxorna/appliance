# We have a conf and classes directory, set up via BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-appliance-app-feishin"
BBFILE_PATTERN_meta-appliance-app-feishin = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-appliance-app-feishin = "10"

LAYERDEPENDS_meta-appliance-app-feishin = ""
LAYERSERIES_COMPAT_meta-appliance-app-feishin = "scarthgap"

# SJ201 ALSA card ordering for the Mycroft Mark II DevKit.
#
# Make the SJ201 audio card (snd_soc_simple_card via the sj201 DT overlay)
# index 0 so it is the default playback/capture device, and the on-SoC
# bcm2835 (HDMI/headphone) index 1.
options snd_soc_simple_card index=0
options snd_bcm2835 index=1

#@TYPE: Machine
#@NAME: Mycroft Mark II DevKit
#@DESCRIPTION: Raspberry Pi 4B with SJ201 daughterboard (XMOS XVF-3510 DSP,
#              TAS5806MD amplifier, Waveshare 4.3" DSI display, GPIO buttons).

require conf/machine/raspberrypi4-64.conf

# I2C for TAS5806MD, XMOS control, GT911 touch
ENABLE_I2C = "1"
# SPI for XMOS firmware upload
ENABLE_SPI_BUS = "1"
# UART for debug console
ENABLE_UART = "1"
# Autoload i2c-dev for userspace I2C access (tas5806-init, xvf3510-flash)
KERNEL_MODULE_AUTOLOAD:rpi += "i2c-dev"

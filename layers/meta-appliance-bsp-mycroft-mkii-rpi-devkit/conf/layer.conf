# Mark II BSP layer — hardware-specific recipes for the Mycroft Mark II DevKit
# (RPi4 + SJ201 daughterboard). Depends only on meta-raspberrypi; the Mark II
# is a standard RPi4 with a well-documented daughterboard, so no
# meta-seeed-cm4 dependency is needed.

BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-appliance-bsp-mycroft-mkii-rpi-devkit"
BBFILE_PATTERN_meta-appliance-bsp-mycroft-mkii-rpi-devkit = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-appliance-bsp-mycroft-mkii-rpi-devkit = "10"

LAYERDEPENDS_meta-appliance-bsp-mycroft-mkii-rpi-devkit = "raspberrypi"
LAYERSERIES_COMPAT_meta-appliance-bsp-mycroft-mkii-rpi-devkit = "scarthgap"

# Enable kernel console on the DSI framebuffer so the display shows a
# login prompt.
CMDLINE:append = " console=tty1"

# Read-only rootfs (belt-and-suspenders with fstab ro mount option)
CMDLINE:append = " ro"

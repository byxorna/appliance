# SJ201 front-panel button mappings for the Mycroft Mark II DevKit.
# GPIO buttons are exposed as gpio-keys by the sj201-buttons DT overlay.
# Action column: 1 = key press, 2 = key release, 0 = either.
# MICMUTE is a slide switch, so it fires on both directions.
KEY_VOLUMEUP    1  /usr/libexec/appliance/volume-up
KEY_VOLUMEDOWN  1  /usr/libexec/appliance/volume-down
KEY_VOICECOMMAND 1 /usr/libexec/appliance/media-play-pause
KEY_MICMUTE     0  /usr/libexec/appliance/mic-mute-toggle

# SJ201 audio support for the Mycroft Mark II DevKit.
#
# TAS5806MD amplifier uses the in-tree tas5805m codec driver.
# The sj201 DT overlay builds a simple-audio-card with the spdif-dit/spdif-dir
# dummy codecs, so those and the simple-card machine driver must be present.
CONFIG_SND_SOC_TAS5805M=m
CONFIG_SND_SIMPLE_CARD=m
CONFIG_SND_SOC_SPDIF=m
CONFIG_SND_SOC_I2C_AND_SPI=m

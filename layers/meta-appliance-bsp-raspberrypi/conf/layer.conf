# Shared BSP layer for vanilla Raspberry Pi machines (Pi 2B, Pi 3B, Pi 4B,
# Pi Zero 2 W). Provides the appliance partition layout (WKS) and fstab.
# No custom DT overlays, config.txt appends, or codec drivers.

BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-appliance-bsp-raspberrypi"
BBFILE_PATTERN_meta-appliance-bsp-raspberrypi = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-appliance-bsp-raspberrypi = "10"

LAYERDEPENDS_meta-appliance-bsp-raspberrypi = "raspberrypi"
LAYERSERIES_COMPAT_meta-appliance-bsp-raspberrypi = "scarthgap"

# Read-only rootfs (belt-and-suspenders with fstab ro mount option)
CMDLINE:append = " ro"

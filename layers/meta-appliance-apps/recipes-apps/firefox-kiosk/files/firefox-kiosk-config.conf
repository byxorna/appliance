# Creates mount points under the kiosk user's home and the
# source directories on the persistent /data partition.
d /home/kiosk/.mozilla 0750 kiosk kiosk -
d /home/kiosk/.mozilla/firefox 0750 kiosk kiosk -
d /home/kiosk/.mozilla/firefox/kiosk 0750 kiosk kiosk -
d /home/kiosk/.cache 0750 kiosk kiosk -
d /home/kiosk/.cache/mozilla 0750 kiosk kiosk -
d /home/kiosk/.cache/mozilla/firefox 0750 kiosk kiosk -
d /home/kiosk/Downloads 0750 kiosk kiosk -

# Persistent directories for Jellyfin Desktop.
# Creates mount points under the kiosk user's home and the
# source directories on the persistent /data partition.
d /home/kiosk/.config 0750 kiosk kiosk -
d /home/kiosk/.config/jellyfin-desktop 0750 kiosk kiosk -
d /home/kiosk/.cache 0750 kiosk kiosk -
d /home/kiosk/.cache/jellyfin-desktop 0750 kiosk kiosk -

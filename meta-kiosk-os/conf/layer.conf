# We have a conf and classes directory, set up via BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-kiosk-os"
BBFILE_PATTERN_meta-kiosk-os = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-kiosk-os = 10

LAYERDEPENDS_meta-kiosk-os = ""
LAYERSERIES_COMPAT_meta-kiosk-os = "scarthgap"

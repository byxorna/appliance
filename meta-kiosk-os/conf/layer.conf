# We have a conf and classes directory, set up via BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-kiosk-os"
BBFILE_PATTERN_meta-kiosk-os = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-kiosk-os = "10"

LAYERDEPENDS_meta-kiosk-os = ""
LAYERSERIES_COMPAT_meta-kiosk-os = "scarthgap"

# meta-seeed-cm4's rpi-bootfiles bbappend downloads dt-blob-disp1-cam2.bin
# from datasheets.raspberrypi.org which is permanently 404. dt-blob.bin is a
# legacy mechanism; the reTerminal display is configured via DT overlays in
# config.txt. Mask the broken bbappend entirely.
BBMASK += "meta-seeed-cm4/recipes-bsp/bootfiles/rpi-bootfiles.bbappend"

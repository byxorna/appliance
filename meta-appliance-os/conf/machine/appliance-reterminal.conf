# Product machine derived from Seeed reTerminal BSP.
#
# meta-seeed-cm4 pins the kernel to 6.1.y, but meta-raspberrypi scarthgap's
# rpi-base.inc lists DT overlays that were added after 6.1 (Pi 5, DSI panel
# variants). These don't have .dts sources in the 6.1 tree, so the kernel
# can't build them and they won't exist in DEPLOY_DIR_IMAGE.
#
# Because IMAGE_BOOT_FILES is derived from KERNEL_DEVICETREE via
# make_dtb_boot_files() at image-recipe parse time, this :remove must be at
# machine conf scope — a kernel bbappend only affects the kernel recipe's
# datastore, not the image recipe's.

require conf/machine/seeed-reterminal.conf

KERNEL_DEVICETREE:remove = " \
    overlays/vc4-kms-dsi-ili9881-7inch.dtbo \
    overlays/vc4-kms-dsi-ili9881-5inch.dtbo \
    overlays/w1-gpio-pi5.dtbo \
    overlays/bcm2712d0.dtbo \
"

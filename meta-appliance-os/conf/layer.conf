# We have a conf and classes directory, set up via BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-appliance-os"
BBFILE_PATTERN_meta-appliance-os = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-appliance-os = "10"

LAYERDEPENDS_meta-appliance-os = ""
LAYERSERIES_COMPAT_meta-appliance-os = "scarthgap"

# meta-seeed-cm4's rpi-bootfiles bbappend downloads dt-blob-disp1-cam2.bin
# from datasheets.raspberrypi.org which is permanently 404. dt-blob.bin is a
# legacy mechanism; the reTerminal display is configured via DT overlays in
# config.txt. Mask the broken bbappend entirely.
BBMASK += "meta-seeed-cm4/recipes-bsp/bootfiles/rpi-bootfiles.bbappend"

# meta-raspberrypi scarthgap's rpi-base.inc lists DT overlays that were added
# after 6.1 (Pi 5, DSI panel variants).  meta-seeed-cm4 pins the kernel to
# 6.1.y, so these .dts sources don't exist and the build fails.  Remove them
# at layer.conf scope so the fix is visible to both the kernel and image
# recipes (IMAGE_BOOT_FILES reads KERNEL_DEVICETREE at parse time).
KERNEL_DEVICETREE:remove = " \
    overlays/vc4-kms-dsi-ili9881-7inch.dtbo \
    overlays/vc4-kms-dsi-ili9881-5inch.dtbo \
    overlays/w1-gpio-pi5.dtbo \
    overlays/bcm2712d0.dtbo \
"

# Optional kas include for development tools and extra container utilities.
#
# The core container runtime (podman, crun, fuse-overlayfs) is installed
# by common.yaml for production.  This layer adds development extras
# (podman-compose, slirp4netns, CNI plugins) and the meta-virtualization
# repo dependency they need.

header:
  version: 14

repos:
  meta-virtualization:
    url: "https://git.yoctoproject.org/meta-virtualization"
    path: build/repos/meta-virtualization
    branch: scarthgap
    commit: 89da4f56b4c510059f8dc1527d289d9fd4fef133

  meta-openembedded:
    layers:
      meta-filesystems:

local_conf_header:
  devtools: |
    IMAGE_INSTALL:append = " \
        podman \
        podman-compose \
        crun \
        slirp4netns \
        fuse-overlayfs \
        cni \
        iptables \
        ca-certificates \
    "

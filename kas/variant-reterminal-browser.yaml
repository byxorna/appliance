# kas configuration for reTerminal Browser Appliance
# Boots into Firefox kiosk mode on the reTerminal's DSI display.

header:
  version: 14
  includes:
    - kas/common.yaml
    - kas/machine-seeed-reterminal.yaml
    - kas/debug.yaml
    - kas/devtools.yaml

machine: seeed-reterminal

local_conf_header:
  app: |
    IMAGE_INSTALL:append = " firefox-kiosk"
  identity: |
    hostname:pn-base-files = "reterminal-browser"

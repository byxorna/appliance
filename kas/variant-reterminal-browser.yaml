# kas configuration for reTerminal Browser Appliance
# Builds on common.yaml + machine config, adding Firefox kiosk.

header:
  version: 14
  includes:
    - kas/features/common.yaml
    - kas/machines/seeed-reterminal.yaml
    - kas/features/kiosk.yaml
    - kas/features/debug.yaml
    - kas/features/devtools.yaml

machine: seeed-reterminal

local_conf_header:
  app: |
    IMAGE_INSTALL:append = " firefox-kiosk"
  identity: |
    hostname:pn-base-files = "reterminal-browser"

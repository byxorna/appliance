# Common kas configuration shared by all build targets.
# Individual builds include this and add machine, BSP repos, and HW packages.
# https://kas.readthedocs.io/en/latest/userguide/project-configuration.html

header:
  version: 14

distro: appliance-os
target: core-image-minimal

env:
  APPLIANCE_VERSION: "0.0.0-unknown"
  APPLIANCE_VARIANT: "unknown"
  APPLIANCE_HOME_URL: ""
  APPLIANCE_BUG_REPORT_URL: ""

repos:
  poky:
    url: "https://git.yoctoproject.org/poky"
    path: build/repos/poky
    branch: scarthgap
    commit: d4576e3c081a7ee7b57d48421c4c4f491cb4defe
    layers:
      meta:
      meta-poky:

  meta-openembedded:
    url: "https://git.openembedded.org/meta-openembedded"
    path: build/repos/meta-openembedded
    branch: scarthgap
    commit: ae7dfb12245c7f9b9a353499e2688015bd4e6413
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-multimedia:

  meta-clang:
    url: "https://github.com/kraj/meta-clang.git"
    path: build/repos/meta-clang
    branch: scarthgap
    commit: 5bce7e26a38a58bb52242494e54ab2af40009574

  meta-browser:
    url: "https://github.com/OSSystems/meta-browser.git"
    path: build/repos/meta-browser
    branch: scarthgap
    commit: 85eeb6b50883d22c977396f5e8fe211a7961cf2e
    layers:
      meta-chromium:

  meta-rauc:
    url: "https://github.com/rauc/meta-rauc.git"
    path: build/repos/meta-rauc
    branch: scarthgap
    commit: d63878f20eba7a85ecf53566e7a3377e78bb46ac

  # LTS mixin layers (backport newer components to scarthgap)
  # Both come from meta-lts-mixins but use different branches.
  meta-lts-mixins-rust:
    url: "https://git.yoctoproject.org/meta-lts-mixins"
    path: build/repos/meta-lts-mixins-rust
    branch: scarthgap/rust
    commit: c19b6da5a3afd3c892b3b1b44983e993ac6d5308

  meta-lts-mixins-uboot:
    url: "https://git.yoctoproject.org/meta-lts-mixins"
    path: build/repos/meta-lts-mixins-uboot
    branch: scarthgap/u-boot
    commit: a44882db02a0ed0f149371831bfbe067665eb42b

  # Local layers (paths relative to repo root)
  meta-appliance-os:
    path: layers/meta-appliance-os

  meta-appliance-apps:
    path: layers/meta-appliance-apps

  meta-appliance-audio:
    path: layers/meta-appliance-audio

local_conf_header:
  rauc: |
    IMAGE_INSTALL:append = " rauc rauc-grow-data-part appliance-mark-good etc-overlay"
    IMAGE_FSTYPES:append = " ext4"
  connectivity: |
    IMAGE_INSTALL:append = " \
        openssh-sshd \
        openssh-sftp-server \
        wpa-supplicant \
        dhcpcd \
        dhcpcd-persistence \
        iproute2 \
        kernel-modules \
    "
    IMAGE_FEATURES:append = " ssh-server-openssh"
    EXTRA_IMAGE_FEATURES:append = " debug-tweaks"

  utilities: |
    IMAGE_INSTALL:append = " \
        vim \
        less \
        htop \
        curl \
        git \
        make \
        tmux \
        zsh \
        sudo \
    "
    INHERIT += "extrausers"
    EXTRA_USERS_PARAMS = "usermod -s /usr/bin/zsh root;"

  kiosk: |
    IMAGE_INSTALL:append = " weston weston-init kiosk-user appliance-init feishin podman crun fuse-overlayfs dbus-user-session"
    SYSTEMD_DEFAULT_TARGET = "graphical.target"

  docs: |
    IMAGE_INSTALL:append = " appliance-docs appliance-selfupdate"

  audio: |
    IMAGE_INSTALL:append = " pipewire wireplumber pipewire-pulse pipewire-user-services"


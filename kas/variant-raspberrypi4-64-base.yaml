# kas configuration for Raspberry Pi 4B base image (64-bit).
# Headless: container runtime, no display stack, no audio.

header:
  version: 14
  includes:
    - kas/features/common.yaml
    - kas/machines/raspberrypi4-64.yaml
    - kas/features/debug.yaml
    - kas/features/devtools.yaml

machine: raspberrypi4-64

local_conf_header:
  identity: |
    hostname:pn-base-files = "raspberrypi4"

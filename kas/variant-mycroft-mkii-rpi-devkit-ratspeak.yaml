# kas configuration for Mycroft Mark II DevKit Ratspeak Appliance
# Mesh messenger with Reticulum transport and LXMF relay.

header:
  version: 14
  includes:
    - kas/features/common.yaml
    - kas/machines/mycroft-mkii-rpi-devkit.yaml
    - kas/features/kiosk.yaml
    - kas/features/debug.yaml
    - kas/features/devtools.yaml

machine: mycroft-mkii-rpi-devkit

local_conf_header:
  app: |
    IMAGE_INSTALL:append = " ratspeak appliance-reticulum"
  identity: |
    hostname:pn-base-files = "mycroft-mkii"

# kas configuration for reTerminal Ratspeak Appliance
# Mesh messenger with Reticulum transport and LXMF relay.

header:
  version: 14
  includes:
    - kas/features/common.yaml
    - kas/machines/seeed-reterminal.yaml
    - kas/features/kiosk.yaml
    - kas/features/debug.yaml
    - kas/features/devtools.yaml

machine: seeed-reterminal

local_conf_header:
  app: |
    IMAGE_INSTALL:append = " ratspeak appliance-reticulum"
  identity: |
    hostname:pn-base-files = "reterminal"

# kas configuration for reTerminal HiFi Appliance
# Builds on common.yaml + machine config, adding Feishin.

header:
  version: 14
  includes:
    - kas/common.yaml
    - kas/machine-seeed-reterminal.yaml
    # Optional: uncomment to include in this build.
    - kas/debug.yaml
    - kas/devtools.yaml

machine: seeed-reterminal

local_conf_header:
  app: |
    IMAGE_INSTALL:append = " feishin"
  identity: |
    hostname:pn-base-files = "reterminal-hifi"

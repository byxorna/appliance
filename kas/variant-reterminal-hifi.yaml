# kas configuration for reTerminal HiFi Appliance
# Builds on common.yaml + machine config, adding Feishin.

header:
  version: 14
  includes:
    - kas/features/common.yaml
    - kas/machines/seeed-reterminal.yaml
    - kas/features/kiosk.yaml
    # Optional: uncomment to include in this build.
    - kas/features/debug.yaml
    - kas/features/devtools.yaml

machine: seeed-reterminal

local_conf_header:
  app: |
    IMAGE_INSTALL:append = " feishin"
  identity: |
    hostname:pn-base-files = "reterminal"

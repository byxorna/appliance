# kas configuration for Mycroft Mark II DevKit HiFi Appliance
# Builds the appliance image for Mark II hardware (RPi4 + SJ201) with Feishin.

header:
  version: 14
  includes:
    - kas/features/common.yaml
    - kas/machines/mycroft-mkii-rpi-devkit.yaml
    - kas/features/kiosk.yaml
    - kas/features/debug.yaml
    - kas/features/devtools.yaml

machine: mycroft-mkii-rpi-devkit

local_conf_header:
  app: |
    IMAGE_INSTALL:append = " feishin"
  identity: |
    hostname:pn-base-files = "mycroft-mkii-rpi-devkit-hifi"

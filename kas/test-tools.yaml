# Optional kas include for on-device hardware validation tools.
# Usage: kas build kas/<build>.yaml:kas/test-tools.yaml
#
# These packages are NOT part of the production image. Include this
# file only when building an image for hardware bring-up and testing.

header:
  version: 14

local_conf_header:
  test-tools: |
    IMAGE_INSTALL:append = " \
        evtest \
        i2c-tools \
        alsa-utils \
        ir-keytable \
        v4l-utils \
        devmem2 \
        kernel-modules \
    "

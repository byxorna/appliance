# kas configuration for Mycroft Mark II DevKit TV Appliance
# Same hardware as HiFi variant (RPi4 + SJ201) but boots into Jellyfin Desktop.

header:
  version: 14
  includes:
    - kas/common.yaml
    - kas/machine-mycroft-mkii-rpi-devkit.yaml
    - kas/debug.yaml
    - kas/devtools.yaml

machine: mycroft-mkii-rpi-devkit

local_conf_header:
  app: |
    IMAGE_INSTALL:append = " jellyfin-desktop"
  identity: |
    hostname:pn-base-files = "mycroft-mkii-rpi-devkit-tv"
